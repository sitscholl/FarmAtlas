general:
    timezone: Europe/Rome
    season_end: "01-10-2025"

meteo:
    api_host: https://meteoservice.oberlenghof.org
    query_template: api/{provider}/timeseries?station_id={station_id}&start_date={start_date:%Y-%m-%dT%H:%M:%SZ}&end_date={end_date:%Y-%m-%dT%H:%M:%SZ}
    radiation_fallback_provider: province
    radiation_fallback_station: 09700MS

resampling:
    freq: D
    min_sample_size: 20

evapotranspiration:
    method: PenmanDaily
    correction:
        season_end: "01-10-2025"
        periods: [
            {"name": "Kc_ini", "value": 0.30, "start": "01-04-2025"},
            {"name": "Kc_mid", "value": 1.10, "start": "01-06-2025"},
            {"name": "Kc_end", "value": 0.65, "start": "01-07-2025"}
        ]

workflows:
  water_balance:
    enabled: true
    schedule:
      freq: D  # examples: D, W-MON, 6H, MS
      time: "05:00"
    run:
      #year: 2025
