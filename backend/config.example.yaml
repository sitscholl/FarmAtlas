general:
    timezone: Europe/Rome
    season_end: "01-10-2025"

database:
    path: sqlite:///db/database.db
    # In Docker on the NAS, prefer an absolute path on the mounted volume:
    # path: sqlite:////app/db/database.db

meteo:
    api_host: https://meteoservice.oberlenghof.org
    query_template: api/{provider}/timeseries?station_id={station_id}&start_date={start_date:%Y-%m-%dT%H:%M:%SZ}&end_date={end_date:%Y-%m-%dT%H:%M:%SZ}
    radiation_fallback_provider: province
    radiation_fallback_station: 09700MS

integrations:
  smartfarmer:
    base_url: https://app.smartfarmer.it/#/auth/welcome/
    username: ""
    password: ""
    keep_downloads: false
    headless: true
    timeout_seconds: 30
    download_timeout_seconds: 90
    report_ready_delay_seconds: 5
    timezone_id: Europe/Rome
    locale: de-DE
    disable_password_manager: true
    # Useful while investigating whether the export can later be replaced with direct HTTP.
    # record_har_path: ../var/smartfarmer/smartfarmer.har
    selectors:
      # Override this if Smart Farmer changes the export button and the fallback XPath breaks.
      # treatment_report_download_button: 'button[title*="Export" i]'

resampling:
    freq: D
    min_sample_size: 20

evapotranspiration:
    method: PenmanDaily
    correction:
        # Study-based apple Kc profile from Zanotelli et al. (2019),
        # Agricultural Water Management 226:105756, South Tyrol orchard.
        season_end: "31-10"
        periods:
            - {"name": "Kc_ini", "value": 0.657, "start": "01-03", "end": "10-04"} #around budburst
            - {"name": "Kc_dev", "kind": "linear", "start": "10-04", "end": "15-06", "start_value": 0.657, "end_value": 1.013} #starts after flowering, when first fruits are there
            - {"name": "Kc_mid", "value": 1.013, "start": "15-06", "end": "16-09"} #starts when leaf area is fully developed
            - {"name": "Kc_late", "kind": "linear", "start": "16-09", "end": "31-10", "start_value": 1.004, "end_value": 0.835} #starts when harvesting
            - {"name": "Kc_end", "value": 0.835, "start": "31-10", "end": "01-11"} #starts when leaves are falling

workflows:
  fetch_treatment_data:
    enabled: false
    schedule:
      freq: D
      time: "04:30"
    run:
      years: current
      source: smartfarmer

  refresh_weather_cache:
    enabled: true
    schedule:
      freq: 1h
      time: "00:00"
    run:
      lookback_days: 180
      max_age_hours: 0
      force: false
      active_only: true
      refresh_forecast: true
      forecast_provider: open-meteo
      forecast_days: 7
      cleanup_older_than_days: 400
